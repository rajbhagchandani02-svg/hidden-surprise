<!DOCKTYPE> <html>
    <head>
        <html lang = "en">
            <meta charset = "UTF-8">
            <title> Surprise Button </title>
            </html>
            <style>
             body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;
        }
        #surpriseBtn {
            padding: 20px 40px;
            font-size: 1.5rem;
            background-color: #ff69b4;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 1.00s;

        #surpriseBtn:hover {
            background-color: #ff1493;
        }
        </style>
    </head>
    <body>
        <button id = "surpriseBtn" onclick = "window.location.href='hidden surprise.html'">Surprise!</button>
